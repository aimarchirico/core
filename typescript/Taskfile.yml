version: '3'

tasks:
  install:
    internal: true
    desc: Install workspace dependencies (CI only; run manually for local dev)
    cmds:
      - npm ci
    status:
      - '[ -z "$CI" ]'

  check:
    desc: Run ESLint and TypeScript checks on packages
    cmds:
      - task: install
      - npx core-ts check .

  fix:
    desc: Auto-fix ESLint issues on packages
    cmds:
      - task: install
      - npx core-ts fix .
