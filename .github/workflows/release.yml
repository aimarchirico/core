name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  # ==========================================
  # RELEASE PLEASE
  # ==========================================
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    outputs:
      paths_released: ${{ steps.release.outputs.paths_released }}
    steps:
      - name: Run Release Please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: tools/release-please-config.json
          manifest-file: tools/.release-please-manifest.json

  # ==========================================
  # MAVEN MODULES
  # ==========================================
  publish-core-security:
    name: Publish core-security
    needs: release-please
    if: contains(fromJSON(needs.release-please.outputs.paths_released), 'maven/security')
    runs-on: ubuntu-latest
    env:
      GITHUB_ACTOR: ${{ github.actor }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Check Out Repo
        uses: actions/checkout@v4

      - name: Set Up Java
        uses: ./.github/actions/setup-java

      - name: Publish Module
        run: task maven:publish
        env:
          MODULE: security

  # ==========================================
  # MAVEN MODULES
  # ==========================================
  publish-core-test:
    name: Publish core-test
    needs: release-please
    if: contains(fromJSON(needs.release-please.outputs.paths_released), 'maven/test')
    runs-on: ubuntu-latest
    env:
      GITHUB_ACTOR: ${{ github.actor }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Check Out Repo
        uses: actions/checkout@v4

      - name: Set Up Java
        uses: ./.github/actions/setup-java

      - name: Publish Module
        run: task maven:publish
        env:
          MODULE: test

  # ==========================================
  # MAVEN MODULES
  # ==========================================
  publish-core-build-logic:
    name: Publish core-build-logic
    needs: release-please
    if: contains(fromJSON(needs.release-please.outputs.paths_released), 'maven/build-logic')
    runs-on: ubuntu-latest
    env:
      GITHUB_ACTOR: ${{ github.actor }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Check Out Repo
        uses: actions/checkout@v4

      - name: Set Up Java
        uses: ./.github/actions/setup-java

      - name: Publish Module
        run: task maven:publish
        env:
          MODULE: build-logic

  # ==========================================
  # NPM PACKAGES
  # ==========================================
  publish-core-ts:
    name: Publish core-ts
    needs: release-please
    if: contains(fromJSON(needs.release-please.outputs.paths_released), 'npm/packages/core-ts')
    runs-on: ubuntu-latest
    steps:
      - name: Check Out Repo
        uses: actions/checkout@v4

      - name: Set Up Node
        uses: ./.github/actions/setup-node
        with:
          cache-dependency-path: npm/pnpm-lock.yaml

      - name: Publish Package
        run: task npm:publish
        env:
          PACKAGE: '@aimarchirico/core-ts'
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-core-expo:
    name: Publish core-expo
    needs: release-please
    if: contains(fromJSON(needs.release-please.outputs.paths_released), 'npm/packages/core-expo')
    runs-on: ubuntu-latest
    steps:
      - name: Check Out Repo
        uses: actions/checkout@v4

      - name: Set Up Node
        uses: ./.github/actions/setup-node
        with:
          cache-dependency-path: npm/pnpm-lock.yaml

      - name: Publish Package
        run: task npm:publish
        env:
          PACKAGE: '@aimarchirico/core-expo'
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-core-openapi:
    name: Publish core-openapi
    needs: release-please
    if: contains(fromJSON(needs.release-please.outputs.paths_released), 'npm/packages/core-openapi')
    runs-on: ubuntu-latest
    steps:
      - name: Check Out Repo
        uses: actions/checkout@v4

      - name: Set Up Node
        uses: ./.github/actions/setup-node
        with:
          cache-dependency-path: npm/pnpm-lock.yaml

      - name: Publish Package 
        run: task npm:publish
        env:
          PACKAGE: '@aimarchirico/core-openapi'
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-core-tools:
    name: Publish core-tools
    needs: release-please
    if: contains(fromJSON(needs.release-please.outputs.paths_released), 'npm/packages/core-tools')
    runs-on: ubuntu-latest
    steps:
      - name: Check Out Repo
        uses: actions/checkout@v4

      - name: Set Up Node
        uses: ./.github/actions/setup-node
        with:
          cache-dependency-path: npm/pnpm-lock.yaml

      - name: Publish Package
        run: task npm:publish
        env:
          PACKAGE: '@aimarchirico/core-tools'
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-core-docs:
    name: Publish core-docs
    needs: release-please
    if: contains(fromJSON(needs.release-please.outputs.paths_released), 'npm/packages/core-docs')
    runs-on: ubuntu-latest
    steps:
      - name: Check Out Repo
        uses: actions/checkout@v4

      - name: Set Up Node
        uses: ./.github/actions/setup-node
        with:
          cache-dependency-path: npm/pnpm-lock.yaml

      - name: Publish Package
        run: task npm:publish
        env:
          PACKAGE: '@aimarchirico/core-docs'
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
