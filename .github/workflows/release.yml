name: Release

on:
  push:
    branches: [dev]

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  # ==========================================
  # RELEASE PLEASE
  # ==========================================
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    outputs:
      paths_released: ${{ steps.release.outputs.paths_released }}
    steps:
      - name: Run Release Please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  # ==========================================
  # MAVEN / GRADLE MODULES
  # ==========================================
  publish-core-security:
    name: Publish core-security
    needs: release-please
    if: contains(fromJSON(needs.release-please.outputs.paths_released), 'kotlin/security')
    runs-on: ubuntu-latest
    env:
      GITHUB_ACTOR: ${{ github.actor }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Check Out Repo
        uses: actions/checkout@v4

      - name: Set Up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
          cache: gradle

      - name: Publish Security Module
        working-directory: kotlin
        run: bash gradlew :security:publish

  publish-core-test:
    name: Publish core-test
    needs: release-please
    if: contains(fromJSON(needs.release-please.outputs.paths_released), 'kotlin/test')
    runs-on: ubuntu-latest
    env:
      GITHUB_ACTOR: ${{ github.actor }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Check Out Repo
        uses: actions/checkout@v4

      - name: Set Up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
          cache: gradle

      - name: Publish Test Module
        working-directory: kotlin
        run: bash gradlew :test:publish

  publish-core-build-logic:
    name: Publish core-build-logic
    needs: release-please
    if: contains(fromJSON(needs.release-please.outputs.paths_released), 'kotlin/build-logic')
    runs-on: ubuntu-latest
    env:
      GITHUB_ACTOR: ${{ github.actor }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Check Out Repo
        uses: actions/checkout@v4

      - name: Set Up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
          cache: gradle

      - name: Publish Convention Plugins
        working-directory: kotlin
        run: bash gradlew -p build-logic publish

  # ==========================================
  # NPM MODULES
  # ==========================================
  publish-core-ts:
    name: Publish core-ts
    needs: release-please
    if: contains(fromJSON(needs.release-please.outputs.paths_released), 'typescript/packages/core-ts')
    runs-on: ubuntu-latest
    steps:
      - name: Check Out Repo
        uses: actions/checkout@v4

      - name: Set Up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com
          scope: '@aimarchirico'
          cache: npm
          cache-dependency-path: typescript/package-lock.json

      - name: Install Dependencies
        run: npm ci
        working-directory: typescript

      - name: Publish core-ts
        run: npm publish -w @aimarchirico/core-ts
        working-directory: typescript
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-core-api:
    name: Publish core-api
    needs: release-please
    if: contains(fromJSON(needs.release-please.outputs.paths_released), 'typescript/packages/core-api')
    runs-on: ubuntu-latest
    steps:
      - name: Check Out Repo
        uses: actions/checkout@v4

      - name: Set Up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com
          scope: '@aimarchirico'
          cache: npm
          cache-dependency-path: typescript/package-lock.json

      - name: Install Dependencies
        run: npm ci
        working-directory: typescript

      - name: Publish core-api
        run: npm publish -w @aimarchirico/core-api
        working-directory: typescript
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-core-conventions:
    name: Publish core-conventions
    needs: release-please
    if: contains(fromJSON(needs.release-please.outputs.paths_released), 'typescript/packages/core-conventions')
    runs-on: ubuntu-latest
    steps:
      - name: Check Out Repo
        uses: actions/checkout@v4

      - name: Set Up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com
          scope: '@aimarchirico'
          cache: npm
          cache-dependency-path: typescript/package-lock.json

      - name: Install Dependencies
        run: npm ci
        working-directory: typescript

      - name: Publish core-conventions
        run: npm publish -w @aimarchirico/core-conventions
        working-directory: typescript
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
