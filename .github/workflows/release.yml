name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  # ==========================================
  # RELEASE PLEASE
  # ==========================================
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    outputs:
      paths_released: ${{ steps.release.outputs.paths_released }}
    steps:
      - name: Run Release Please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: tools/release-please-config.json
          manifest-file: tools/.release-please-manifest.json

  # ==========================================
  # MAVEN MODULES
  # ==========================================
  publish-commons-security:
    name: Publish commons-security
    needs: release-please
    if: contains(fromJSON(needs.release-please.outputs.paths_released), 'maven/security')
    runs-on: ubuntu-latest
    env:
      GITHUB_ACTOR: ${{ github.actor }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Check Out Repo
        uses: actions/checkout@v7

      - name: Set Up Java
        uses: ./.github/actions/setup-java

      - name: Publish Module
        env:
          MODULE: security
        run: task maven:publish

  # ==========================================
  # MAVEN MODULES
  # ==========================================
  publish-commons-test:
    name: Publish commons-test
    needs: release-please
    if: contains(fromJSON(needs.release-please.outputs.paths_released), 'maven/test')
    runs-on: ubuntu-latest
    env:
      GITHUB_ACTOR: ${{ github.actor }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Check Out Repo
        uses: actions/checkout@v7

      - name: Set Up Java
        uses: ./.github/actions/setup-java

      - name: Publish Module
        env:
          MODULE: test
        run: task maven:publish

  # ==========================================
  # MAVEN MODULES
  # ==========================================
  publish-commons-convention:
    name: Publish commons-convention
    needs: release-please
    if: contains(fromJSON(needs.release-please.outputs.paths_released), 'maven/commons-convention')
    runs-on: ubuntu-latest
    env:
      GITHUB_ACTOR: ${{ github.actor }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Check Out Repo
        uses: actions/checkout@v7

      - name: Set Up Java
        uses: ./.github/actions/setup-java

      - name: Publish Module
        env:
          MODULE: commons-convention
        run: task maven:publish

  # ==========================================
  # NPM MODULES
  # ==========================================
  publish-commons-ts:
    name: Publish commons-ts
    needs: release-please
    if: contains(fromJSON(needs.release-please.outputs.paths_released), 'npm/packages/commons-ts')
    runs-on: ubuntu-latest
    steps:
      - name: Check Out Repo
        uses: actions/checkout@v7

      - name: Set Up Node
        uses: ./.github/actions/setup-node
        with:
          cache-dependency-path: npm/pnpm-lock.yaml

      - name: Publish Package
        env:
          PACKAGE: '@aimarchirico/commons-ts'
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: task npm:publish

  publish-commons-expo:
    name: Publish commons-expo
    needs: release-please
    if: contains(fromJSON(needs.release-please.outputs.paths_released), 'npm/packages/commons-expo')
    runs-on: ubuntu-latest
    steps:
      - name: Check Out Repo
        uses: actions/checkout@v7

      - name: Set Up Node
        uses: ./.github/actions/setup-node
        with:
          cache-dependency-path: npm/pnpm-lock.yaml

      - name: Publish Package
        env:
          PACKAGE: '@aimarchirico/commons-expo'
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: task npm:publish

  publish-commons-openapi:
    name: Publish commons-openapi
    needs: release-please
    if: contains(fromJSON(needs.release-please.outputs.paths_released), 'npm/packages/commons-openapi')
    runs-on: ubuntu-latest
    steps:
      - name: Check Out Repo
        uses: actions/checkout@v7

      - name: Set Up Node
        uses: ./.github/actions/setup-node
        with:
          cache-dependency-path: npm/pnpm-lock.yaml

      - name: Publish Package
        env:
          PACKAGE: '@aimarchirico/commons-openapi'
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: task npm:publish

  publish-commons-tools:
    name: Publish commons-tools
    needs: release-please
    if: contains(fromJSON(needs.release-please.outputs.paths_released), 'npm/packages/commons-tools')
    runs-on: ubuntu-latest
    steps:
      - name: Check Out Repo
        uses: actions/checkout@v7

      - name: Set Up Node
        uses: ./.github/actions/setup-node
        with:
          cache-dependency-path: npm/pnpm-lock.yaml

      - name: Publish Package
        env:
          PACKAGE: '@aimarchirico/commons-tools'
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: task npm:publish

  publish-commons-docs:
    name: Publish commons-docs
    needs: release-please
    if: contains(fromJSON(needs.release-please.outputs.paths_released), 'npm/packages/commons-docs')
    runs-on: ubuntu-latest
    steps:
      - name: Check Out Repo
        uses: actions/checkout@v7

      - name: Set Up Node
        uses: ./.github/actions/setup-node
        with:
          cache-dependency-path: npm/pnpm-lock.yaml

      - name: Publish Package
        env:
          PACKAGE: '@aimarchirico/commons-docs'
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: task npm:publish
