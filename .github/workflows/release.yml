name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  # ==========================================
  # RELEASE PLEASE
  # ==========================================
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    outputs:
      paths_released: ${{ steps.release.outputs.paths_released }}
    steps:
      - name: Run Release Please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  # ==========================================
  # MAVEN / GRADLE MODULES
  # ==========================================
  publish-core-security:
    name: Publish core-security
    needs: release-please
    if: contains(fromJSON(needs.release-please.outputs.paths_released), 'gradle/security')
    runs-on: ubuntu-latest
    env:
      GITHUB_ACTOR: ${{ github.actor }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Check Out Repo
        uses: actions/checkout@v4

      - name: Set Up Gradle
        uses: ./.github/actions/setup-gradle

      - name: Publish Module
        env:
          MODULE: security
        run: task gradle:publish

  publish-core-test:
    name: Publish core-test
    needs: release-please
    if: contains(fromJSON(needs.release-please.outputs.paths_released), 'gradle/test')
    runs-on: ubuntu-latest
    env:
      GITHUB_ACTOR: ${{ github.actor }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Check Out Repo
        uses: actions/checkout@v4

      - name: Set Up Gradle
        uses: ./.github/actions/setup-gradle

      - name: Publish Module
        env:
          MODULE: test
        run: task gradle:publish

  publish-core-build-logic:
    name: Publish core-build-logic
    needs: release-please
    if: contains(fromJSON(needs.release-please.outputs.paths_released), 'gradle/build-logic')
    runs-on: ubuntu-latest
    env:
      GITHUB_ACTOR: ${{ github.actor }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Check Out Repo
        uses: actions/checkout@v4

      - name: Set Up Gradle
        uses: ./.github/actions/setup-gradle

      - name: Publish Module
        env:
          MODULE: build-logic
        run: task gradle:publish

  # ==========================================
  # NPM MODULES
  # ==========================================
  publish-core-ts:
    name: Publish core-ts
    needs: release-please
    if: contains(fromJSON(needs.release-please.outputs.paths_released), 'pnpm/packages/core-ts')
    runs-on: ubuntu-latest
    steps:
      - name: Check Out Repo
        uses: actions/checkout@v4

      - name: Set Up PNPM
        uses: ./.github/actions/setup-pnpm

      - name: Publish Package
        env:
          PACKAGE: '@aimarchirico/core-ts'
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: task pnpm:publish

  publish-core-expo:
    name: Publish core-expo
    needs: release-please
    if: contains(fromJSON(needs.release-please.outputs.paths_released), 'pnpm/packages/core-expo')
    runs-on: ubuntu-latest
    steps:
      - name: Check Out Repo
        uses: actions/checkout@v4

      - name: Set Up PNPM
        uses: ./.github/actions/setup-pnpm

      - name: Publish Package
        env:
          PACKAGE: '@aimarchirico/core-expo'
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: task pnpm:publish

  publish-core-api:
    name: Publish core-api
    needs: release-please
    if: contains(fromJSON(needs.release-please.outputs.paths_released), 'pnpm/packages/core-api')
    runs-on: ubuntu-latest
    steps:
      - name: Check Out Repo
        uses: actions/checkout@v4

      - name: Set Up PNPM
        uses: ./.github/actions/setup-pnpm

      - name: Publish Package
        env:
          PACKAGE: '@aimarchirico/core-api'
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: task pnpm:publish

  publish-core-tools:
    name: Publish core-tools
    needs: release-please
    if: contains(fromJSON(needs.release-please.outputs.paths_released), 'pnpm/packages/core-tools')
    runs-on: ubuntu-latest
    steps:
      - name: Check Out Repo
        uses: actions/checkout@v4

      - name: Set Up PNPM
        uses: ./.github/actions/setup-pnpm

      - name: Publish Package
        env:
          PACKAGE: '@aimarchirico/core-tools'
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: task pnpm:publish

  publish-core-docs:
    name: Publish core-docs
    needs: release-please
    if: contains(fromJSON(needs.release-please.outputs.paths_released), 'pnpm/packages/core-docs')
    runs-on: ubuntu-latest
    steps:
      - name: Check Out Repo
        uses: actions/checkout@v4

      - name: Set Up PNPM
        uses: ./.github/actions/setup-pnpm

      - name: Publish Package
        env:
          PACKAGE: '@aimarchirico/core-docs'
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: task pnpm:publish
