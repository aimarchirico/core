name: CI

on:
  pull_request:
    branches: [dev, main]

permissions:
  contents: read
  packages: write

jobs:
  # ==========================================
  # PATH FILTERING
  # ==========================================
  changes:
    name: Detect Changed Paths
    runs-on: ubuntu-latest
    outputs:
      maven: ${{ steps.filter.outputs.maven }}
      npm: ${{ steps.filter.outputs.npm }}
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - name: Check Out Repo
        uses: actions/checkout@v7

      - name: Detect Changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            maven:
              - 'maven/**'
              - '.github/workflows/ci.yml'
            npm:
              - 'npm/**'
              - '.github/workflows/ci.yml'
            docs:
              - '**/*.md'
              - '.github/workflows/ci.yml'

  # ==========================================
  # MAVEN CI JOB
  # ==========================================
  maven:
    name: Maven Check
    needs: changes
    if: needs.changes.outputs.maven == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Check Out Repo
        uses: actions/checkout@v7

      - name: Set Up Java
        uses: ./.github/actions/setup-java

      - name: Run Check
        run: task maven:check

  # ==========================================
  # NPM CI JOB
  # ==========================================
  npm:
    name: NPM Check
    needs: changes
    if: needs.changes.outputs.npm == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Check Out Repo
        uses: actions/checkout@v7

      - name: Set Up Node
        uses: ./.github/actions/setup-node
        with:
          cache-dependency-path: npm/pnpm-lock.yaml

      - name: Run Check
        run: task npm:check

  # ==========================================
  # COMMIT CI JOB
  # ==========================================
  commitlint:
    name: Commit Check
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check Out Repo
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set Up Node
        uses: ./.github/actions/setup-node
        with:
          cache-dependency-path: tools/pnpm-lock.yaml

      - name: Run Check
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FROM_SHA: ${{ github.event.pull_request.base.sha }}
          TO_SHA: ${{ github.event.pull_request.head.sha }}
        run: task commit:check

  # ==========================================
  # DOCUMENTATION CI JOB
  # ==========================================
  docs:
    name: Docs Check
    needs: changes
    if: needs.changes.outputs.docs == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Check Out Repo
        uses: actions/checkout@v7

      - name: Set Up Node
        uses: ./.github/actions/setup-node
        with:
          cache-dependency-path: tools/pnpm-lock.yaml

      - name: Run Docs Checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: task docs:check
