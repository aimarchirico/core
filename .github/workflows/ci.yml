name: CI

on:
  workflow_dispatch:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]

permissions:
  contents: read
  packages: write

jobs:
  # ==========================================
  # PATH FILTERING
  # ==========================================
  changes:
    name: Detect Changed Paths
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - name: Check Out Repo
        uses: actions/checkout@v4

      - name: Detect Changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - 'modules/**'
              - 'packages/**'
              - 'Taskfile.yml'
              - 'package.json'
              - 'package-lock.json'
              - '.github/workflows/ci.yml'
            docs:
              - '**/*.md'
              - '.github/workflows/ci.yml'
              - 'package.json'
              - 'package-lock.json'

  # ==========================================
  # CODE CI JOB (BUILD, TEST, LINT, TYPECHECK)
  # ==========================================
  code:
    name: Code Check
    needs: changes
    if: needs.changes.outputs.code == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Check Out Repo
        uses: actions/checkout@v4

      - name: Set Up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
          cache: gradle

      - name: Set Up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Set Up Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x

      - name: Install Dependencies
        run: npm ci

      - name: Run Checks
        run: task check

  # ==========================================
  # DOCUMENTATION CI JOB (LIGHTWEIGHT LINTER)
  # ==========================================
  docs:
    name: Docs Check
    needs: changes
    if: needs.changes.outputs.docs == 'true' && needs.changes.outputs.code != 'true' && github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Check Out Repo
        uses: actions/checkout@v4

      - name: Set Up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Dependencies
        run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Lint Markdown
        run: npx markdownlint-cli2
