name: CI

on:
  workflow_dispatch:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]

permissions:
  contents: read
  packages: write

jobs:
  # ==========================================
  # PATH FILTERING
  # ==========================================
  changes:
    name: Detect Changed Paths
    runs-on: ubuntu-latest
    outputs:
      kotlin: ${{ steps.filter.outputs.kotlin }}
      typescript: ${{ steps.filter.outputs.typescript }}
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - name: Check Out Repo
        uses: actions/checkout@v4

      - name: Detect Changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            kotlin:
              - 'kotlin/**'
              - '.github/workflows/ci.yml'
            typescript:
              - 'typescript/**'
              - '.github/workflows/ci.yml'
            docs:
              - '**/*.md'
              - '.github/workflows/ci.yml'

  # ==========================================
  # KOTLIN CI JOB
  # ==========================================
  kotlin:
    name: Kotlin Modules Check
    needs: changes
    if: needs.changes.outputs.kotlin == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Check Out Repo
        uses: actions/checkout@v4

      - name: Set Up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
          cache: gradle

      - name: Set Up Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x

      - name: Run Checks
        run: task kotlin:check

  # ==========================================
  # TYPESCRIPT CI JOB
  # ==========================================
  typescript:
    name: TypeScript Packages Check
    needs: changes
    if: needs.changes.outputs.typescript == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Check Out Repo
        uses: actions/checkout@v4

      - name: Set Up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: typescript/package-lock.json

      - name: Set Up Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x

      - name: Run Checks
        run: task typescript:check

  # ==========================================
  # COMMITLINT CI JOB
  # ==========================================
  commitlint:
    name: Commitlint
    runs-on: ubuntu-latest
    steps:
      - name: Check Out Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set Up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Set Up Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x

      - name: Lint Commit Range
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            task commit:lint -- --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose
          elif [ "${{ github.event_name }}" = "push" ]; then
            if [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ] || [ -z "${{ github.event.before }}" ]; then
              task commit:lint -- --from HEAD~1 --to HEAD --verbose
            else
              task commit:lint -- --from ${{ github.event.before }} --to ${{ github.event.after }} --verbose
            fi
          else
            task commit:lint -- --from HEAD~1 --to HEAD --verbose
          fi

  # ==========================================
  # DOCUMENTATION CI JOB (LINT)
  # ==========================================
  docs:
    name: Docs Check
    needs: changes
    # Only run standalone if code changes aren't already triggering full checks
    if: needs.changes.outputs.docs == 'true' && needs.changes.outputs.kotlin != 'true' && needs.changes.outputs.typescript != 'true' && github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Check Out Repo
        uses: actions/checkout@v4

      - name: Set Up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Set Up Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x

      - name: Run Docs Checks
        run: task docs:check
