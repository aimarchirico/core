version: '3'

dotenv: ['.env']

includes:
  kotlin:
    taskfile: ./kotlin/Taskfile.yml
    dir: ./kotlin
  typescript:
    taskfile: ./typescript/Taskfile.yml
    dir: ./typescript

tasks:
  default:
    cmds:
      - task --list

  build:
    desc: Build the Kotlin modules
    cmds:
      - task: kotlin:build

  check:
    desc: Run all checks (modules, packages, and docs)
    cmds:
      - task: check:modules
      - task: check:packages
      - task: check:docs

  check:modules:
    desc: Run JVM and Gradle checks
    cmds:
      - task: kotlin:check

  check:packages:
    desc: Run ESLint and TypeScript checks
    cmds:
      - task: typescript:check

  check:docs:
    desc: Lint Markdown documentation files
    cmds:
      - npx markdownlint-cli2

  fix:
    desc: Auto-fix formatting and linting issues
    cmds:
      - task: fix:modules
      - task: fix:packages
      - task: fix:docs

  fix:modules:
    desc: Format Kotlin code
    cmds:
      - task: kotlin:fix

  fix:packages:
    desc: Auto-fix ESLint issues
    cmds:
      - task: typescript:fix

  fix:docs:
    desc: Auto-fix Markdown issues
    cmds:
      - npx markdownlint-cli2 --fix
