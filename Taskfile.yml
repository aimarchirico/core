version: '3'

includes:
  "backend:build-logic":
    taskfile: ./modules/build-logic/Taskfile.yml
    dir: ./modules/build-logic
  "backend:security":
    taskfile: ./modules/security/Taskfile.yml
    dir: ./modules/security
  "backend:test":
    taskfile: ./modules/test/Taskfile.yml
    dir: ./modules/test
  # Imported from the installed package, exactly as a consumer repo would after
  # `npm install @aimarchirico/core-openapi`. npm workspaces symlink the package
  # into node_modules, so this path resolves identically in core and consumers.
  # Marked optional so `task` still works before dependencies are installed.
  "frontend:core-openapi":
    taskfile: ./node_modules/@aimarchirico/core-openapi/Taskfile.yml
    optional: true

tasks:
  default:
    cmds:
      - task --list

  build:
    desc: Build all active core components (modules)
    cmds:
      - task: backend:build-logic:build
      - task: backend:security:build
      - task: backend:test:build

  check:
    desc: Run tests and lint checks on all active components
    cmds:
      - task: backend:build-logic:check
      - task: backend:security:check
      - task: backend:test:check

  fix:
    desc: Format/fix all active components
    cmds:
      - task: backend:security:fix
      - task: backend:test:fix
