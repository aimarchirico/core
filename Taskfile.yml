version: '3'

dotenv: ['.env']

tasks:
  default:
    cmds:
      - task --list

  build:
    desc: Build the modules (automatically compiles build-logic)
    cmds:
      - bash modules/gradlew -p modules build

  check:
    desc: Run all checks (modules, packages, and docs)
    cmds:
      - task: check:modules
      - task: check:packages
      - task: check:docs

  "check:modules":
    desc: Run JVM and Gradle check tasks
    cmds:
      - bash modules/gradlew -p modules check

  "check:packages":
    desc: Run ESLint and TypeScript checks on packages
    cmds:
      - npx eslint
      - npx tsc

  "check:docs":
    desc: Lint Markdown documentation files
    cmds:
      - npx markdownlint-cli2

  fix:
    desc: Auto-fix formatting and linting issues (modules, packages, and docs)
    cmds:
      - task: "fix:modules"
      - task: "fix:packages"
      - task: "fix:docs"

  "fix:modules":
    desc: Format Kotlin code with ktfmt
    cmds:
      - bash modules/gradlew -p modules ktfmtFormat

  "fix:packages":
    desc: Auto-fix ESLint issues on packages
    cmds:
      - npx eslint --fix

  "fix:docs":
    desc: Auto-fix Markdown documentation linting issues
    cmds:
      - npx markdownlint-cli2 --fix
