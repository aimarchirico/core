version: '3'

tasks:
  default:
    cmds:
      - task --list

  build:
    desc: Build the convention plugin and modules
    cmds:
      - bash modules/gradlew -p modules/build-logic build
      - bash modules/gradlew -p modules build

  check:
    desc: Run tests, quality checks, and Markdown lint
    cmds:
      - bash modules/gradlew -p modules/build-logic check
      - bash modules/gradlew -p modules check
      - npx markdownlint-cli2
      - npx eslint
      - npx tsc

  fix:
    desc: Format Kotlin and auto-fix Markdown
    cmds:
      - bash modules/gradlew -p modules ktfmtFormat
      - npx markdownlint-cli2 --fix
      - npx eslint --fix
