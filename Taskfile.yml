version: '3'

dotenv: ['.env']

includes:
  kotlin:
    taskfile: ./kotlin/Taskfile.yml
    dir: ./kotlin
  typescript:
    taskfile: ./typescript/Taskfile.yml
    dir: ./typescript

tasks:
  default:
    cmds:
      - task --list

  install:
    internal: true
    desc: Install root dependencies (CI only; run manually for local dev)
    cmds:
      - npm ci
    status:
      - '[ -z "$CI" ]'

  build:
    desc: Build the Kotlin modules
    cmds:
      - task: kotlin:build

  check:
    desc: Run all checks (modules, packages, and docs)
    cmds:
      - task: kotlin:check
      - task: typescript:check
      - task: docs:check

  fix:
    desc: Auto-fix formatting and linting issues
    cmds:
      - task: kotlin:fix
      - task: typescript:fix
      - task: docs:fix

  docs:check:
    desc: Lint Markdown documentation files
    cmds:
      - task: install
      - task: typescript:install
      - npx core-conventions check

  docs:fix:
    desc: Auto-fix Markdown documentation issues
    cmds:
      - task: install
      - task: typescript:install
      - npx core-conventions fix

  docs:init:
    desc: Materialize shared CONTRIBUTING.md and .github templates
    cmds:
      - task: install
      - npx core-conventions init

  commit:lint:
    desc: Lint commit messages with commitlint (forwards args, e.g. --from/--to)
    cmds:
      - task: install
      - task: typescript:install
      - npx core-conventions commitlint {{.CLI_ARGS}}
